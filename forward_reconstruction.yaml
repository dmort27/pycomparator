# Sound Laws for Proto-Tangkhulic Forward Reconstruction
# 
# This file defines sound laws and a phylogenetic tree for applying them.
# Laws map proto-forms to reflexes in daughter languages.

# Sound laws: [source, target, left_context, right_context]
# - Empty string "" means "no constraint" for contexts
# - Empty source "" means insertion; empty target "" means deletion
# - Use \Z for word-final position in right context
laws:
  # Shared laws (used by multiple branches)
  cluster-simpl: ["[bp][lr]", "p", "", ""]
  d-to-r: ["d", "r", "", ""]
  barred-i-to-u: ["ɨ", "u", "", ""]
  b-to-p: ["b", "p", "", ""]
  hw-to-w: ["hw", "w", "", ""]
  tl-to-t: ["tl", "t", "", ""]
  esh-to-s: ["ʃ", "s", "", ""]

  # Ukhrul: a-lowering before codas
  a-lowering: ["a", "ɐ", "", "[mnŋptk]"]
  w-to-h: ["w", "h", "", ""]

  # Huishu: vowel fronting, stop lenition
  ej-to-u-final: ["ej", "u", "", "\\Z"]
  a-to-e-final: ["a", "e", "", "\\Z"]
  stop-to-glottal-final: ["[ptk]", "ʔ", "", "\\Z"]
  c-to-ts: ["c", "ts", "", ""]

  # Kachai: fricativization, vowel backing
  hw-to-f: ["hw", "f", "", ""]
  ts-to-eth: ["ts", "ð", "", ""]
  d-to-eth: ["d", "ð", "", ""]
  ej-to-i-final: ["ej", "i", "", "\\Z"]
  a-to-turned-a-nasal-final: ["a", "ɐ", "[nŋ]", "\\Z"]
  a-to-u-final: ["a", "u", "", "\\Z"]
  i-to-turned-a-final: ["i", "ɐ", "", "\\Z"]

  # Tusom: palatalization, vowel fronting
  hw-to-curly-c: ["hw", "ɕ", "", ""]
  esh-to-curly-c: ["ʃ", "ɕ", "", ""]
  c-to-t-curly-c: ["c", "tɕ", "", ""]
  ts-to-z: ["ts", "z", "", ""]
  d-to-t: ["d", "t", "", ""]
  tl-to-l-belt: ["tl", "ɬ", "", ""]
  ej-to-a-final: ["ej", "a", "", "\\Z"]
  a-to-i-final: ["a", "i", "", "\\Z"]

# Phylogenetic tree: maps parent nodes to lists of children with their laws
# Leaf nodes (languages) are children that don't appear as keys
tree:
  ROOT:
    - child: nor-tk
      laws:
        - cluster-simpl
        - d-to-r
        - barred-i-to-u
        - b-to-p
        - hw-to-w
        - tl-to-t
    - child: kac
      laws:
        - hw-to-f
        - ts-to-eth
        - d-to-eth
        - tl-to-t
        - i-to-turned-a-final
        - a-to-turned-a-nasal-final
        - a-to-u-final
        - ej-to-i-final
    - child: tus
      laws:
        - hw-to-curly-c
        - esh-to-curly-c
        - c-to-t-curly-c
        - ts-to-z
        - d-to-t
        - tl-to-l-belt
        - a-to-i-final
        - ej-to-a-final
  
  nor-tk:
    - child: ukh
      laws:
        - w-to-h
        - a-lowering
    - child: hui
      laws:
        - ej-to-u-final
        - a-to-e-final
        - stop-to-glottal-final
        - esh-to-s
        - c-to-ts
